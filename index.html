<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>ORDENA AS SILABAS:</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef2ff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.caixa{
  width:1000px;
  height:750px;
  background: repeating-linear-gradient(white, white 38px, #cfd8ff 40px);
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  padding:40px;
  text-align:center;
  overflow:hidden;
  position:relative;
}

h1{ margin-top:20px; font-size:28px; color: #2a5bd7 }

#placar{ font-size:26px; font-weight:bold; margin-bottom:10px; }

#numeroPalavra{ font-size:22px; margin-bottom:10px; }

#progresso{
  width:80%;
  height:15px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin:0 auto 20px auto;
}

#barra{
  height:100%;
  width:0%;
  background:#4CAF50;
  transition:width 0.4s ease;
}

img{
  width:160px;
  height:160px;
  object-fit:contain;
  margin:10px;
}

.silabas{
  display:flex;
  justify-content:center;
  gap:25px;
  margin:10px 0;
  flex-wrap:wrap;
  min-height:120px;
}

.silaba{
  background:#ffd966;
  padding:15px 30px;
  border-radius:12px;
  font-size:40px;
  font-weight:bold;
  box-shadow:3px 3px 6px rgba(0,0,0,0.2);
}

input{
  font-size:40px;
  text-align:center;
  width:300px;
  border:none;
  border-bottom:4px solid #2a5bd7;
  background:transparent;
  outline:none;
  padding:8px;
  margin-top:10px;
}

/* Container para botão + créditos lado a lado e à direita */
#acao-container{
  display:flex;
  justify-content:flex-end; /* alinha à direita */
  align-items:center;
  gap:20px;
  margin-top:15px;
  padding-right: 10px; /* distância da borda direita */
}

button{
  font-size:22px;
  padding:15px 50px;
  display:block;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

button:hover{ background:#45a049; }

#creditos{
  font-size:15px;
  color:#000000;
}

#mensagem{
  font-size:38px;
  margin-top:15px;
  min-height:60px;
}

/* Email no fundo da caixa */
#email{
  position: absolute;
  bottom:5px;
  width:100%;
  text-align:center;
  font-size:30px;
  color:#111184;
}

/* Animação pulsante para a mensagem final */
@keyframes pulse{
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}
.final-message{
  display:inline-block;
  padding:20px 40px;
  background:#4CAF50;
  color:white;
  font-size:36px;
  border-radius:15px;
  box-shadow:3px 3px 10px rgba(0,0,0,0.3);
  animation: pulse 1s infinite alternate;
}
</style>
</head>

❌ Erros: <span id="erros">0</span>
</div>

<div id="progresso"><div id="barra"></div></div>

// === FUNÇÕES DO JOGO ===
function gerarSilabas(palavra){
  let silabas = palavra.match(/[^aeiouãõáéíóúâêô]*[aeiouãõáéíóúâêô]+/gi);
  if(!silabas) silabas=[palavra];
  return silabas;
}

function misturar(array){
  if(array.length<=1) return array;
  let resultado=[...array];
  do{
    resultado.sort(()=>Math.random()-0.5);
  }while(resultado.join("")===array.join(""));
  return resultado;
}

let indice=0;
let certas=0;
let erros=0;

function novaPalavra(){
  let atual=palavras[indice];
  document.getElementById("imagem").src=atual.imagem;

  let silabas = atual.silabas ? atual.silabas : gerarSilabas(atual.correta);
  let misturadas = misturar(silabas);

  let html="";
  misturadas.forEach(function(s){
    html+="<div class='silaba'>"+s+"</div>";
  });

  document.getElementById("silabas").innerHTML=html;
  document.getElementById("resposta").value="";
  document.getElementById("mensagem").innerHTML="";
  document.getElementById("numeroPalavra").innerHTML="Palavra "+(indice+1)+" de "+palavras.length;

  let percentagem=((indice+1)/palavras.length)*100;
  document.getElementById("barra").style.width=percentagem+"%";
}

function verificar(){
  let resposta=document.getElementById("resposta").value.toLowerCase();
  let correta=palavras[indice].correta.toLowerCase();

  if(resposta===correta){
    certas++;
    document.getElementById("certas").innerHTML=certas;

    indice++;
    if(indice>=palavras.length){
      document.getElementById("mensagem").innerHTML=`
        <div class="final-message">
          🎉 Parabéns! Terminaste o jogo! 🎉
          <br><br>
          <button onclick="reiniciar()">🔄 Jogar Novamente</button>
        </div>`;
      return;
    }

    document.getElementById("mensagem").innerHTML="✅ BOM TRABALHO, CONTINUA!";
    setTimeout(novaPalavra,1200);

  }else{
    erros++;
    document.getElementById("erros").innerHTML=erros;
    document.getElementById("mensagem").innerHTML="❌ TENTA NOVAMENTE";
  }
}

function reiniciar(){
  indice=0;
  certas=0;
  erros=0;
  document.getElementById("certas").innerHTML=0;
  document.getElementById("erros").innerHTML=0;
  document.getElementById("mensagem").innerHTML="";
  novaPalavra();
}

document.getElementById("resposta").addEventListener("keypress",function(e){
  if(e.key==="Enter") verificar();
});
